<svg width="100%" height="120" viewBox="0 0 800 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="50%" stop-color="#7000FF" />
      <stop offset="100%" stop-color="#00F0FF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; filter: drop-shadow(0 0 15px #00F0FF); }
      50% { opacity: 0.4; filter: drop-shadow(0 0 2px #7000FF); }
    }
    @keyframes move {
      0% { transform: translateX(0px); }
      50% { transform: translateX(8px); }
      100% { transform: translateX(0px); }
    }
    .animated-text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 900;
      font-size: 52px;
      fill: url(#glowGrad);
      animation: blink 2s infinite ease-in-out, move 4s infinite ease-in-out;
    }
    .sub-text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 600;
      font-size: 16px;
      fill: #A0AEC0;
      letter-spacing: 5px;
    }
  </style>
  <rect width="100%" height="100%" rx="12" fill="#0D0E15" />
  <g transform="translate(40, 20)">
    <!-- Animated Diamond Icon -->
    <g transform="translate(0, 15)">
      <path d="M 20 0 L 40 20 L 20 40 L 0 20 Z" fill="#00F0FF" opacity="0.9">
        <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="8s" repeatCount="indefinite" />
      </path>
    </g>
    <!-- Text group -->
    <text x="65" y="42" class="animated-text">💎 NEXUS-1MD</text>
    <text x="68" y="70" class="sub-text">THE ULTIMATE WHATSAPP POWER-BOT</text>
  </g>
</svg>
